name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        # The cuda extra pulls the NVRTC/ptxas wheels (Linux x86_64) so the kernel-compile
        # tests run on CI; they compile on CPU and need no GPU.
        run: python -m pip install -e ".[dev,cuda]"
      - name: Lint
        run: python -m ruff check src tests examples
      - name: Test
        run: python -m pytest -q
